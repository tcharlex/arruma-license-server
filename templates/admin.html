<!DOCTYPE html>
<html>
<head>
    <title>Painel de Licenças</title>
    <style>
        body { font-family: Arial; background:#111; color:#eee; }
        table { width:100%; border-collapse: collapse; }
        th,td { padding:10px; border-bottom:1px solid #333; }
        tr:hover { background:#222; }
        .free { color:#6f6; }
        .used { color:#6cf; }
        .blocked { color:#f66; }
        button { padding:6px 12px; cursor:pointer; }
        .topbar { margin-bottom:15px; }
    </style>
</head>
<body>

<h2>Painel de Licenças</h2>

<div class="topbar">
    <button onclick="gerar()">Gerar nova licença</button>
</div>

<table>
<tr>
    <th>Chave</th>
    <th>Status</th>
    <th>Máquina</th>
    <th>Ação</th>
</tr>

{% for lic in licenses %}
<tr>
    <td>{{lic.key}}</td>
    <td class="{% if lic.status=='Livre' %}free{% elif lic.status=='Ativada' %}used{% else %}blocked{% endif %}">
        {{lic.status}}
    </td>
    <td>{{lic.machine}}</td>
    <td>
        <button onclick="bloquear('{{lic.key}}')">Bloquear</button>
    </td>
</tr>
{% endfor %}

</table>

<script>

const TOKEN = "{{token}}";

async function gerar() {
    const r = await fetch("/generate", {
        method: "POST",
        headers: { "Authorization": "Bearer " + TOKEN }
    });

    const j = await r.json();
    alert("Nova licença: " + j.key);
    location.reload();
}

async function bloquear(key) {
    if(!confirm("Bloquear licença?")) return;

    await fetch("/revoke", {
        method: "POST",
        headers: {
            "Content-Type":"application/json",
            "Authorization":"Bearer " + TOKEN
        },
        body: JSON.stringify({key:key})
    });

    location.reload();
}

</script>

</body>
</html>
